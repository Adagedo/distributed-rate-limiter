syntax = "proto3";

package gateway.metadata.v1;

service RateLimitService {
  rpc Validate(RateLimitRequest) returns (RateLimitResponse){}
}

// rate limiting request
message RateLimitRequest {
  string domain = 1; // auth , order, payment etc....
  repeated Descriptor descriptors = 2;
}

// rules descriptors
message Descriptor{
  repeated Entry entries = 1;
}
// entries
message Entry {
  string key = 1; // user_id, endpoint, or ip
  string value = 2; // random id, login, ip val
}

message RateLimitResponse{

  bool allowed = 1;
  int32 token_left = 2;
  int64 reset_after_ms = 3;
}
