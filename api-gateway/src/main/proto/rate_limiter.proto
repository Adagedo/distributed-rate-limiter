syntax = "proto3";

// 1. FIXED: Changed hyphen to an underscore for legal Java package formatting
option java_package = "code.adagedo.rate_limiter";
option java_multiple_files = true;

// 2. FIXED: Explicitly set a custom outer wrapper name to avoid any future conflicts
option java_outer_classname = "RateLimiterProto";

service RateLimitService {
  // Main decision: allow or reject request
  rpc Validate(RateLimitRequest) returns (RateLimitResponse){}
}

message RateLimitRequest {
  // Logical grouping of rules (auth, orders, payments, etc.)
  string domain = 1;

  // 3. FIXED: Changed field type to RateLimitDescriptor to prevent internal naming collisions
  repeated RateLimitDescriptor descriptors = 2;
}

// 3. FIXED: Renamed from Descriptor to RateLimitDescriptor
message RateLimitDescriptor {
  repeated Entry entries = 1;
}

message Entry {
  string key = 1;   // e.g. user_id, endpoint, ip
  string value = 2; // e.g. 42, login, 203.0.113.10
}

message RateLimitResponse {
  bool allowed = 1;
  int32 token_left = 2;
  int64 reset_after_ms = 3; // when the limit resets (epoch millis)
}
